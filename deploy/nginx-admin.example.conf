# 管理台静态站 + 同源 API 反代（推荐，避免浏览器跨域与 CDN 拦截 OPTIONS）
# 域名示例：wx.ht.2000gallery.art
# 构建：VITE_PUBLIC_API_BASE_URL=same-origin npm run build

server {
    listen 443 ssl http2;
    server_name wx.ht.2000gallery.art;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    root /var/www/art_data/dist;
    index index.html;

    # Node HTTPS 服务（与 index.js PORT 一致，默认 2000）
    location /api/ {
        proxy_pass https://127.0.0.1:2000/api/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
