# 宝塔面板 — 管理台 wx.ht.2000gallery.art（Vue 静态 + 独立 API 域名）
# 用法：网站 → wx.ht.2000gallery.art → 设置 → 配置文件，用下方 server 块替换或合并
# 部署：npm run build 后，将 dist/ 内全部文件上传到 /www/wwwroot/wx.ht.2000gallery.art/

server {
    listen 80;
    listen 443 ssl http2;
    server_name wx.ht.2000gallery.art;

    root /www/wwwroot/wx.ht.2000gallery.art;
    index index.html;

    # 证书路径以宝塔「SSL」里实际为准（申请证书后会自动生成）
    # ssl_certificate    /www/server/panel/vhost/cert/wx.ht.2000gallery.art/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/wx.ht.2000gallery.art/privkey.pem;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/wx.ht.2000gallery.art.conf;
    #CERT-APPLY-CHECK--END

    # 若 extension 目录里有反代到 127.0.0.1:2000 的配置且 Node 未启动，会导致 502，请删除或注释
    # include /www/server/panel/vhost/nginx/extension/wx.ht.2000gallery.art/*.conf;

    # 管理台为纯静态，不需要 PHP（保留 enable-php 会让部分请求走 PHP 导致异常）
    # include enable-php-00.conf;

    # Vue Router history 模式：所有前端路由回落到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.well-known {
        allow all;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|webp|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~ .*\.(js|css|woff2?|ttf|map)$ {
        expires 12h;
        access_log off;
    }

    access_log /www/wwwlogs/wx.ht.2000gallery.art.log;
    error_log  /www/wwwlogs/wx.ht.2000gallery.art.error.log;
}
