# 宝塔 — api.wx.2000gallery.art
# 重要：index.js 使用 https.createServer，端口 2000 是 HTTPS，不是 HTTP！
# proxy_pass 必须写 https://127.0.0.1:2000
# ESA 回源：HTTP、端口 80

# 可选：若未在 location 里启用 proxy_cache，可删掉下面这行 cache 定义
# proxy_cache_path /www/wwwroot/api.wx.2000gallery.art/proxy_cache_dir levels=1:2 keys_zone=api_wx_2000gallery_art_cache:20m inactive=1d max_size=5g;

server {
    listen 80;
    server_name api.wx.2000gallery.art;

    include /www/server/panel/vhost/nginx/well-known/api.wx.2000gallery.art.conf;

    # API 站点不需要 PHP
    # include enable-php-00.conf;

    client_max_body_size 55m;

    #PROXY-CONF-START
    location ^~ / {
        proxy_pass https://127.0.0.1:2000;
        proxy_ssl_verify off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    #PROXY-CONF-END

    location /.well-known {
        allow all;
    }

    access_log /www/wwwlogs/api.wx.2000gallery.art.log;
    error_log  /www/wwwlogs/api.wx.2000gallery.art.error.log;
}
