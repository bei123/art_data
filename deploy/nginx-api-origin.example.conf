# API 源站：CDN 回源到本机 443，再反代到 Node HTTPS :2000
# 域名：api.wx.2000gallery.art
# Node 已处理 CORS，此处勿重复 add_header Access-Control-*，避免双份头

upstream art_data_node {
    server 127.0.0.1:2000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name api.wx.2000gallery.art;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    client_max_body_size 55m;

    location / {
        proxy_pass https://art_data_node;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
