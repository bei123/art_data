# 管理台：仅静态资源（配合独立 API 域名 api.wx.2000gallery.art）
# 域名：wx.ht.2000gallery.art
# 构建：VITE_PUBLIC_API_BASE_URL=https://api.wx.2000gallery.art

server {
    listen 443 ssl http2;
    server_name wx.ht.2000gallery.art;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    root /var/www/art_data/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
